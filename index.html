<!DOCTYPE html>
<html lang="en">


<head>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link rel="apple-touch-icon" href="static/favicon.png">
    <title>PhraseChain</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"> 

    <style>
        /* PAGE SETUP */
        :root {
            --letter-color: #222222;
            }

        * {
            touch-action: manipulation;
        }

        html, body {
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            }

        button, input {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;

            font-family: Arial, sans-serif;
            background-color: #FFF8F6;
            }

        /* HOME SCREEN */
        #home-screen {
            position: fixed;
            inset: 0;

            display: flex;
            flex-direction: column;
            align-items: center;

            background: #FFF8F6;
            z-index: 3000;

            padding: 6dvh 0;
            transition: opacity 0.3s ease;
        }

        #home-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* TOP LOGO */
        #home-top {
            margin-top: 6dvh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        #home-logo {
            width: min(420px, 80vmin);
        }

        /* BUTTONS */
        #home-buttons {
            display: flex;
            flex-direction: column;

            margin-top: 8dvh;   /* clean spacing from logo */
            gap: 2dvh;
        }

        #home-buttons button {
            width: 24dvh;
            height: 7dvh;
            font-size: 3dvh;
        }

        /* TIMER (pinned to bottom) */
        #home-timer {
            position: absolute;
            bottom: 4dvh;

            text-align: center;
            font-weight: bold;
            font-size: 3dvh;
            color: #6a80f7;
        }

        #countdown {
            margin-top: -0.5dvh;
            font-size: 3dvh;
            font-weight: bold;
        }

        #game-area {
            flex: 1; /* 🔥 takes all available vertical space */
            display: none;
            
            flex-direction: column;
            align-items: center;

            justify-content: flex-start;
            padding-top: 5dvh;
        }

        /* LOGO */
        #logo-container {
            margin-top: -1dvh;
            margin-bottom: 3dvh;
        }

        #logo {
            width: min(180px, 60vw);
            max-height: 10dvh; /* 🔥 key */
        }

        /* PHRASE CHAIN */
        .word-row {
            display: flex;
            justify-content: center;
            gap: 0.58dvh;
            }

        input {
            width: 5.5dvh;
            height: 5.5dvh;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
            font-size: 2dvh;
            text-align: center;
            text-transform: uppercase;
            border: 0.30dvh solid #a3a3a3;
            border-radius: 1dvh;
            font-weight: bold;

            background-color: #FFF8F6;

            caret-color: transparent;

            color: var(--letter-color);
            -webkit-appearance: none;
            appearance: none;

            opacity: 1 !important;              /* 🔥 force full opacity */

            color: #222222 !important;

            box-shadow: none;                  /* prevent iOS weirdness */
            }

        input:focus {
            outline: none;
            }


        /* ACTIVE WORD (current row) */
        .active input {
            background-color: #FFF8F6;
            border-color: #6a80f7;
            box-shadow: 0 0 1dvh #6a80f7;
            }

        .completed input {
            background-color: #FFF8F6;
            }


        /* WRONG WORD FEEDBACK */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-0.5dvh); }
            50% { transform: translateX(0.5dvh); }
            75% { transform: translateX(-0.5dvh); }
            100% { transform: translateX(0); }
            }

        .shake-input {
            animation: shake 0.25s;
            }

        .flash {
            background-color: #ffbaca !important;
            border-color: #ff5b81 !important;
            box-shadow: 0 0 1dvh #ff5b81 !important;
            }


        /* CORRECT WORD FEEDBACK */
        @keyframes correctShake {
            0%   { transform: scale(1.05); background-color: #c8d1ff;}
            25%  { transform: scale(1.1); background-color: #c8d1ff;}
            50%  { transform: scale(1.15); background-color: #c8d1ff;}
            75%  { transform: scale(1.05); background-color: #c8d1ff;}
            100% { transform: translateY(0); background-color: #FFF8F6; }
            }

        .correct-anim input {
            animation: correctShake 0.25s ease;
            }


        /* HINT BOX */
        #hint-display {
            position: static;
            margin-top: 1dvh;
            width: 51.7dvh;
            height: 5.6dvh;

            border-radius: 9.5dvh;
            border: .3dvh solid #F2B146;
            background-color: #FFF8F6;

            font-weight: bold;
            text-transform: uppercase;

            opacity: 0;
            transition: opacity 0.5s ease;

            display: flex;              /* 🔥 add this */
            align-items: center;        /* 🔥 vertical center */
            justify-content: center;    /* 🔥 horizontal center */
            text-align: center;
        }

        .hint-body {
            font-size: 1.8dvh;
            font-weight: bold;
            color: #222222;
            word-wrap: break-word;
            }

        #hint-display.show {
            opacity: 1;
            }

        .no-transition {
            transition: none !important;
            }


        /* EXIT/SCORE/HINT BAR */
        #bottom-bar {
            position: static;
            margin-top: 0.8dvh;

            display: flex;
            align-items: center;
            gap: 1.47dvh;
        }
            
        button {
            height: 4.6dvh;
            width: 16.2dvh;
            line-height: 1;

            border-radius: 9.5dvh;
            border: 0.3dvh solid #a3a3a3;
            background-color: #FFF8F6;

            font-size: 2dvh;
            font-weight: bold;

            cursor: pointer;
            text-transform: uppercase;

            transition: all 0.15s ease;
            touch-action: manipulation;
            color: #222222;
            -webkit-appearance: none;
            appearance: none;
            }

        @media (hover: hover) and (pointer: fine) {
            button:hover {
                transform: translateY(-0.2dvh) scale(1.05);
                border: .3dvh solid #F2B146;
                box-shadow: 0 0 1dvh #F2B146;
            }
        }       

        @media (hover: hover) and (pointer: fine) {
            #ui-container {
                margin-bottom: 3dvh;
            }
        }

            /* click */
            button:active {
            transform: scale(0.95);
            }
            
        /* SCORE BOX */
        #score-box {
            height: 4.1dvh;
            width: 16.2dvh;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 9.5dvh;
            border: 0.3dvh solid #a3a3a3;
            text-transform: uppercase;

            background-color: #FFF8F6;

            position: relative;

            font-weight: bold;
            font-size: 2dvh;
            }

        #score-popup {
            position: absolute;
            left: 50%;
            top: -3.8dvh; /* start just above box */
            transform: translateX(-50%);
            font-size: 2.9dvh;
            font-weight: bold;
            color: #6a80f7;

            opacity: 0;
            pointer-events: none;
            }   

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(-50%, 0dvh);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -2.5dvh);
            }
            }       

        .score-animate {
            animation: floatUp 2s ease;
            }

        @keyframes scoreFlash {
            0% {
                border: .3dvh solid #6a80f7;
                box-shadow: 0 0 1dvh #6a80f7;
            }
            100% {
                border: .3vh solid #a3a3a3;
                box-shadow: 0 0 1dvh transparent;
            }   
            }

        .score-flash {
            animation: scoreFlash 2s ease;
        }

        .score-animate {
            animation: floatUp 2s ease;
        }



    /* START WORD INITIAL STATE */
        #start-row {
        transform: scale(0.8);
        opacity: 0;
        }

        /* BOUNCE IN */
        @keyframes startPop {
            0% {
                transform: scale(0.75);
                opacity: 0;
            }
            60% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
                transform: translateY(.95dvh);
            }
        }

        .start-pop {
        animation: startPop 1s ease forwards;
        }

    /* CHAIN INITIAL STATE */
        #chain .word-row {
            opacity: 0;
            transform: translateY(-0.95dvh);
        }
       
        #chain {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 1.65dvh;

            gap: 0.8dvh;      /* 🔥 controls spacing cleanly */
        }


    /* FADE IN ANIMATION */
    @keyframes fadeDown {
    to {
        opacity: 1;
        transform: translateY(0.1dvh);
    }
    }

    .word-row.show {
        animation: fadeDown 0.4s ease forwards;
        }

    #keyboard {
            position: static;
            margin-top: -1.2dvh;

            display: flex;
            flex-direction: column;
            gap: 0.3dvh;

            padding: 0.95dvh 0;
        }

    .kb-row {
    display: flex;
    justify-content: center;
    gap: 0.3dvh;
    }

    #keyboard button {
    width: 5dvh;
    height: 5dvh;

    border-radius: 1dvh;
    border: 0.3dvh solid #a3a3a3;
    background: #FFF8F6;

    font-weight: bold;
    font-size: 1.8dvh;

    cursor: pointer;
    }

    #keyboard button:hover {
        border: .3dvh solid #a3a3a3;       /* reset border */
        box-shadow: none;             /* remove glow */
        }

    #keyboard button.wide {
    width: 5.8dvh;
    }

    #keyboard button:active {
        transform: scale(0.9);
        }


    /* INITIAL STATE */
        #ui-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1dvh;
            
            opacity: 0;
            pointer-events: none;
        }

    /* ANIMATION */
    @keyframes uiFadeBounce {
    0% {
        opacity: 0;
        transform: translateY(0) scale(1);
    }
    50% {
        opacity: 1;
        transform: translateY(0) scale(0.95);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
    }

    /* ACTIVE STATE */
    #ui-container.show {
    animation: uiFadeBounce 0.5s ease forwards;
    pointer-events: auto;
    }

    /* OVERLAY */
    #end-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.4);

    display: flex;
    align-items: center;
    justify-content: center;

    z-index: 2000;
    }

    /* HIDDEN STATE */
    .hidden {
    display: none !important;
    }

    /* POPUP BOX */
    #popup-content {
        background: #FFF8F6;
        padding: 4dvh 4dvh;          /* 30px 40px → scaled */
        border-radius: 2dvh;         /* 20px */
        border: 0.8dvh solid #ccc;   /* 8px */

        text-align: center;

        position: relative;
        width: 40dvh;     
    }

    /* CLOSE BUTTON */
    #popup-close {
        position: absolute;
        top: 1dvh;                   /* 10px */
        right: 1.4dvh;               /* 14px */
        font-size: 3dvh;           /* 22px */
        cursor: pointer;
    }

    #popup-logo img {
        width: 25dvh;                /* 200px */
        margin-bottom: 1dvh;         /* 10px */
    }

    #popup-date {
        font-size: 2.2dvh;           /* 22px */
        font-weight: bold;
        margin-bottom: 2dvh;         /* 20px */
    }

    /* EMOJI */
    #popup-emoji {
        font-size: 6dvh;             /* 60px */
        margin-bottom: 1dvh;
    }

    /* SCORE */
    #popup-score {
        font-size: 2.2dvh;
        font-weight: bold;
        margin-bottom: 0.5dvh;
    }

    /* TUTORIAL OVERLAY (same style as end popup) */
    #tutorial-popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0,0,0,0.4);

        display: flex;
        align-items: center;
        justify-content: center;

        z-index: 4000;
    }

    #tutorial-content {
        background: #FFF8F6;
        border-radius: 2dvh;
        border: 0.8dvh solid #ccc;

        position: relative;

        max-height: 85dvh;

        margin: 3dvw; /* 🔥 THIS FIXES IT */

        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        isolation: isolate;
    }

    #tutorial-image {
    width: 100%;
    height: auto;
    max-height: 75dvh;

    object-fit: contain;
    display: block;
    transform: translateZ(0);
    }

    #tutorial-close {
        position: absolute;
        top: 1dvh;
        right: 1.4dvh;

        font-size: 2dvh;
        cursor: pointer;
        z-index: 6000;
    }

    #chain-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform-origin: top center;
    }

    </style>
</head>


<body>
    
    <script src="script.js"></script>
    <div id="home-screen">
        <div id="home-top">
            <img src="static/PhraseChainIcon.svg" id="home-logo">
        </div>

        <div id="home-buttons">
            <button onclick="startGame()">PLAY</button>
            <button onclick="showTutorial()">TUTORIAL</button>
        </div>

        <div id="home-timer">
            <div>NEXT CHAIN IN</div>
            <div id="countdown">00:00:00</div>
        </div>
    </div>


    <div id="game-area">
        <!-- LOGO -->
        <div id="logo-container">
            <img src="static/PhraseChainIcon.svg" id="logo">
        </div>

        <!-- START WORD -->
        <div id="chain-wrapper">
            <div id="start-row" class="word-row"></div>
            <div id="chain"></div>
        </div>

        <div id="hint-display"></div>
        <div id="ui-container">

            <div id="bottom-bar">
                <button id="exit-btn" onclick="location.reload()">EXIT</button>

                <div id="score-box">
                    <div id="score-value">0 PTS</div>
                    <div id="score-popup"></div>
                </div>

                <button id="hint-btn" onclick="useHint()">1st Hint</button>
            </div>

            <div id="keyboard">
            <div class="kb-row">
                <button data-key="Q">Q</button>
                <button data-key="W">W</button>
                <button data-key="E">E</button>
                <button data-key="R">R</button>
                <button data-key="T">T</button>
                <button data-key="Y">Y</button>
                <button data-key="U">U</button>
                <button data-key="I">I</button>
                <button data-key="O">O</button>
                <button data-key="P">P</button>
            </div>

            <div class="kb-row">
                <button data-key="A">A</button>
                <button data-key="S">S</button>
                <button data-key="D">D</button>
                <button data-key="F">F</button>
                <button data-key="G">G</button>
                <button data-key="H">H</button>
                <button data-key="J">J</button>
                <button data-key="K">K</button>
                <button data-key="L">L</button>
            </div>

            <div class="kb-row">
                <button data-key="Z">Z</button>
                <button data-key="X">X</button>
                <button data-key="C">C</button>
                <button data-key="V">V</button>
                <button data-key="B">B</button>
                <button data-key="N">N</button>
                <button data-key="M">M</button>
                <button class="wide" data-key="Backspace">⌫</button>
            </div>
            </div>
            </div>
    </div>

<script>
    let puzzle;
    let currentWordIndex = 0;
    let hintLevel = 0;
    let lockedLetters = {}; // track locked letters from hints
    let currentLetterIndex = 0;
    let totalScore = 0;
    let wordScores = []; // track each word's score

    function startGame() {
        const home = document.getElementById("home-screen");

        home.classList.add("hide");
        document.getElementById("tutorial-popup").classList.add("hidden");

        setTimeout(() => {
            home.style.display = "none";
            document.getElementById("game-area").style.display = "flex";
            loadPuzzle();
        }, 250);
    }

    function resetSave() {
    localStorage.removeItem("phraseChainSave");
    location.reload();
    }

    function updateCountdown() {
        const now = new Date();

        // convert to Pacific Time
        const pst = new Date(
            now.toLocaleString("en-US", { timeZone: "America/Los_Angeles" })
        );

        const tomorrow = new Date(pst);
        tomorrow.setHours(24, 0, 0, 0); // next midnight

        const diff = tomorrow - pst;

        const hours = String(Math.floor(diff / 3600000)).padStart(2, "0");
        const minutes = String(Math.floor((diff % 3600000) / 60000)).padStart(2, "0");
        const seconds = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");

        document.getElementById("countdown").textContent =
            `${hours}:${minutes}:${seconds}`;
    }

    // update every second
    setInterval(updateCountdown, 1000);
    updateCountdown();

    async function loadPuzzle() {
        const res = await fetch("puzzles.json");
        const puzzles = await res.json();
        const today = getTodayDateISO();

        puzzle = puzzles.find(p => p.date === today);

        // fallback (for testing)
        if (!puzzle) {
            puzzle = puzzles[0];
        }

        renderStartWord();
        renderChain();

        setTimeout(() => {
            document.getElementById("start-row").classList.add("start-pop");
        }, 50);

        // ✅ TRY LOAD SAVE
        const loaded = loadProgress();

        if (!loaded) {
            const firstInputs = getInputs(0);
            firstInputs[0].disabled = false;
            firstInputs[0].focus();
        }
    }

    function getTodayDateISO() {
        const now = new Date();

        const pst = new Date(
            now.toLocaleString("en-US", { timeZone: "America/Los_Angeles" })
        );

        const year = pst.getFullYear();
        const month = String(pst.getMonth() + 1).padStart(2, "0");
        const day = String(pst.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
    }

    function exitGame() {
        const game = document.getElementById("game-area");
        const home = document.getElementById("home-screen");

        game.style.opacity = "0";

        setTimeout(() => {
            game.style.display = "none";
            game.style.opacity = "1";

            home.style.display = "flex";
            home.classList.remove("hide");

            resetGameState();
        }, 300);
    }

    function resetGameState() {
        // Clear chain
        document.getElementById("chain").innerHTML = "";
        document.getElementById("start-row").innerHTML = "";

        // Hide UI container again
        document.getElementById("ui-container").classList.remove("show");

        // Reset hint button text
        const hintBtn = document.getElementById("hint-btn");
        if (hintBtn) hintBtn.textContent = "1ST HINT";

        // Remove hint box if it exists
        const hintBox = document.getElementById("hint-box");
        if (hintBox) hintBox.remove();

        // Close popup if open
        const popup = document.getElementById("popup");
        if (popup) popup.style.display = "none";
    }


    function renderStartWord() {
    const container = document.getElementById("start-row");
    container.innerHTML = "";

    container.classList.add("completed"); // ✅ ADD THIS

    puzzle.start.split("").forEach(char => {
        if (char === " ") {
        const spacer = document.createElement("div");
        spacer.style.width = "1.2vh"; // half-width gap
        container.appendChild(spacer);
        return;
        }

        const box = document.createElement("input");
        box.value = char.toUpperCase();
        box.disabled = true;

        container.appendChild(box);
    });
    }

    function updateScoreDisplay(pointsGained) {
        const scoreValue = document.getElementById("score-value");
        const popup = document.getElementById("score-popup");
        const scoreBox = document.getElementById("score-box");

        // update total
        scoreValue.textContent = `${totalScore} PTS`;

        // ✨ trigger border glow
        scoreBox.classList.remove("score-flash");
        void scoreBox.offsetWidth; // restart animation
        scoreBox.classList.add("score-flash");

        // ✨ show +points
        popup.textContent = `+${pointsGained}`;
        popup.classList.remove("score-animate");
        void popup.offsetWidth;
        popup.classList.add("score-animate");
        }

    function renderChain() {
    const container = document.getElementById("chain");
    container.innerHTML = "";

    function exitGame() {
        if (confirm("Exit today's puzzle?")) {
            window.location.reload(); // simple reset
        }
        }

    puzzle.chain.forEach((word, wIndex) => {
        const row = document.createElement("div");
        row.classList.add("word-row");

        if (wIndex === 0) row.classList.add("active");

        for (let i = 0; i < word.length; i++) {
        const input = document.createElement("input");

        input.maxLength = 1;
        input.dataset.word = wIndex;
        input.dataset.letter = i;

        input.disabled = !(wIndex === 0 && i === 0);

        row.appendChild(input);
        }

        container.appendChild(row);

        const baseDelay = 800; // wait for start word bounce

        setTimeout(() => {
            row.classList.add("show");
            }, baseDelay + (wIndex * 120));
    });

    const totalDelay = 1000 + (puzzle.chain.length * 120) + 200;
    scaleChainIfNeeded();

    setTimeout(() => {
    document.getElementById("ui-container").classList.add("show");
    }, totalDelay);
    
    }

    function getRow(wordIndex) {
    return document.querySelectorAll("#chain .word-row")[wordIndex];
    }

    function getInputs(wordIndex) {
    return document.querySelectorAll(`input[data-word='${wordIndex}']`);
    }

    function handleKeyPress(e) {
    const inputs = getInputs(currentWordIndex);
    const key = e.key;

    if (key === "Backspace" || /^[a-zA-Z]$/.test(key)) {
        e.preventDefault();
    }

    // ignore if finished
    if (currentWordIndex >= puzzle.chain.length) return;

    // LETTER INPUT
    if (/^[a-zA-Z]$/.test(key)) {
    const inputs = getInputs(currentWordIndex);

    // find next available slot
    while (
        currentLetterIndex < inputs.length &&
        lockedLetters[`${currentWordIndex}-${currentLetterIndex}`]
    ) {
        currentLetterIndex++;
    }

    if (currentLetterIndex >= inputs.length) return;

    inputs[currentLetterIndex].value = key.toUpperCase();

    currentLetterIndex++;

    checkWord();
    saveProgress();
        }

    // BACKSPACE
        else if (key === "Backspace") {
        const inputs = getInputs(currentWordIndex);

        // find the last filled index BEFORE current position
        let i = currentLetterIndex - 1;

        // move left until we find something editable
        while (i >= 0) {
            // skip locked letters
            if (lockedLetters[`${currentWordIndex}-${i}`]) {
            i--;
            continue;
            }

            // clear this box
            if (inputs[i].value !== "") {
            inputs[i].value = "";
            currentLetterIndex = i;
            saveProgress();
            return;
            }

            i--;
        }

        // if we reach here, do nothing (protects first letter)
        }
    }

    function scaleChainIfNeeded() {
        const wrapper = document.getElementById("chain-wrapper");

        // get longest word length (ignore spaces)
        const allWords = [puzzle.start, ...puzzle.chain];
        const longest = Math.max(
            ...allWords.map(w => w.replace(/\s/g, "").length)
        );

        // ✅ only scale if 9+ characters
        if (longest < 9) {
            wrapper.style.transform = "scale(1)";
            return;
        }

        // reset scale first so we measure correctly
        wrapper.style.transform = "scale(1)";

        // wait one frame so layout updates
        requestAnimationFrame(() => {
            const actualWidth = wrapper.scrollWidth;
            const screenWidth = window.innerWidth;

            const maxAllowed = screenWidth * 0.92; // small padding

            if (actualWidth > maxAllowed) {
                const scale = maxAllowed / actualWidth;

                wrapper.style.transform = `scale(${scale})`;
            } else {
                wrapper.style.transform = "scale(1)";
            }
        });
    }

    function checkWord() {
    const inputs = getInputs(currentWordIndex);
    const values = Array.from(inputs).map(i => i.value);

    // ⛔ Don't check until ALL letters filled
    if (values.some(v => v === "")) return;

    const guess = values.join("");
    const answer = puzzle.chain[currentWordIndex].toUpperCase();

    if (guess === answer) {
        lockWord(inputs);
    } else {
        showWrongFeedback(inputs);
    }
    }

    function clearHintBox() {
        const hintBox = document.getElementById("hint-display");

        // 🚫 disable animation temporarily
        hintBox.classList.add("no-transition");

        // instantly hide
        hintBox.classList.remove("show");
        hintBox.innerHTML = "";

        // force reflow (locks it in)
        void hintBox.offsetHeight;

        // ✅ re-enable animation for next time
        hintBox.classList.remove("no-transition");
        }

    function lockWord(inputs) {
    const row = getRow(currentWordIndex);

    // apply green shake to whole row
    row.classList.add("correct-anim");

    setTimeout(() => {
        row.classList.remove("correct-anim");

        inputs.forEach(i => {
        i.disabled = true;
        });

        row.classList.remove("active");
        row.classList.add("completed");

        // 🎯 SCORE CALCULATION
    let score = 0;

    if (hintLevel === 0) score = 300;
    else if (hintLevel === 1) score = 200;
    else if (hintLevel === 2) score = 100;
    else score = 0;

    totalScore += score;
    wordScores.push(score);
    updateScoreDisplay(score);

    // reset for next word
    currentWordIndex++;
    hintLevel = 0;

    const hintBox = document.getElementById("hint-display");
    const hintBtn = document.getElementById("hint-btn");

    // clear hint UI
    clearHintBox();

    // reset button text
    hintBtn.textContent = "1ST HINT";

        unlockNextWord();
        saveProgress();
    }, 350);
        
    }

    function getMedal(score) {
    if (score === 2100) return "Perfect 🎖️";
    if (score >= 1900) return "Gold 🥇";
    if (score >= 1500) return "Silver 🥈";
    if (score >= 700) return "Bronze 🥉";
    return "☠️";
    }

    function unlockNextWord() {
    const rows = document.querySelectorAll("#chain .word-row");

    if (currentWordIndex >= puzzle.chain.length) {
        const hintBtn = document.getElementById("hint-btn");

        // change button to RESULTS
        hintBtn.textContent = "RESULTS";
        hintBtn.onclick = showEndPopup;

        showEndPopup();
        return;
    }

    const nextRow = rows[currentWordIndex];
    nextRow.classList.add("active");

    const inputs = getInputs(currentWordIndex);

    inputs.forEach(i => i.disabled = false);

    currentLetterIndex = 0; // ✅ critical

    inputs[0].focus();
    }

    function showWrongFeedback(inputs) {
        inputs.forEach(input => {
            input.classList.add("flash");
            input.classList.add("shake-input");
        });

        setTimeout(() => {
            inputs.forEach(input => {
                input.classList.remove("flash");
                input.classList.remove("shake-input");
            });
        }, 300);
    }

    function useHint() {
        const inputs = getInputs(currentWordIndex);
        const hintBtn = document.getElementById("hint-btn");
        const hintBox = document.getElementById("hint-display");

        // 🥇 FIRST HINT
        if (hintLevel === 0) {

            // reset word
            inputs.forEach((input, i) => {
            input.value = "";
            input.classList.remove("locked-letter");
            input.disabled = false;
            delete lockedLetters[`${currentWordIndex}-${i}`];
            });

            currentLetterIndex = 0;

            const letter = puzzle.hints[currentWordIndex][0].toUpperCase();

            inputs[0].value = letter;
            inputs[0].classList.add("locked-letter");

            lockedLetters[`${currentWordIndex}-0`] = true;

            currentLetterIndex = 1;

            hintBtn.textContent = "2ND HINT";
        }

        // 🥈 SECOND HINT
        else if (hintLevel === 1) {

            const clue = puzzle.hints[currentWordIndex][1];

            hintBox.innerHTML = `
                <div class="hint-body">${clue}</div>
                `;
            hintBox.classList.add("show");

            hintBtn.textContent = "REVEAL";
        }

        // 🟥 REVEAL
        else if (hintLevel === 2) {

            const answer = puzzle.chain[currentWordIndex].toUpperCase();

            inputs.forEach((input, i) => {
            input.value = answer[i];
            input.disabled = true;
            });

            clearHintBox();

            lockWord(inputs);
        }

        hintLevel++;
        saveProgress();
        }
    window.addEventListener("resize", scaleChainIfNeeded);
    document.addEventListener("keydown", handleKeyPress);
    document.addEventListener("touchstart", () => {}, { passive: true });
    document.querySelectorAll("#keyboard button").forEach(btn => {
        btn.addEventListener("click", () => {
            const key = btn.dataset.key;

            handleKeyPress({
                key: key,
                preventDefault: () => {}
            });
        });
    });

    function getTodayDate() {
    const d = new Date();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const yyyy = d.getFullYear();
    return `${mm}-${dd}-${yyyy}`;
    }

    function getMedalEmoji(score) {
    if (score === 2100) return "🎖️";
    if (score >= 1900) return "🥇";
    if (score >= 1500) return "🥈";
    if (score >= 700) return "🥉";
    return "☠️";
    }

    function showTutorial() {
        const popup = document.getElementById("tutorial-popup");
        document.getElementById("tutorial-popup").classList.remove("hidden");
    }

    function closeTutorial() {
        document.getElementById("tutorial-popup").classList.add("hidden");
    }

    function showEndPopup() {
    const popup = document.getElementById("end-popup");

    const date = getTodayDate();
    const emoji = getMedalEmoji(totalScore);

    document.getElementById("popup-date").textContent = date;

    document.getElementById("popup-emoji").textContent = emoji;

    document.getElementById("popup-score").textContent =
        `${totalScore} POINTS`;

    popup.classList.remove("hidden");
    }

    function closePopup() {
    document.getElementById("end-popup").classList.add("hidden");
    }

    function saveProgress() {
        const data = {
            date: getTodayDate(),
            currentWordIndex,
            currentLetterIndex,
            lockedLetters,
            totalScore,
            hintLevel,
            wordInputs: []
        };

        // save all letters
        puzzle.chain.forEach((_, wIndex) => {
            const inputs = getInputs(wIndex);
            data.wordInputs[wIndex] = Array.from(inputs).map(i => i.value);
        });

        localStorage.setItem("phraseChainSave", JSON.stringify(data));
    }

    function loadProgress() {
        const saved = localStorage.getItem("phraseChainSave");
        if (!saved) return false;

        const data = JSON.parse(saved);

        // ❌ different day → ignore
        if (data.date !== getTodayDate()) {
            localStorage.removeItem("phraseChainSave");
            return false;
        }
        lockedLetters = data.lockedLetters || {};

        // restore state
        currentWordIndex = data.currentWordIndex;

        
        totalScore = data.totalScore || 0;
        hintLevel = data.hintLevel || 0;

        data.wordInputs.forEach((word, wIndex) => {
            const inputs = getInputs(wIndex);
            if (!inputs) return;

            // ✅ Completed words → restore normally
            if (wIndex < currentWordIndex && word) {
                word.forEach((letter, i) => {
                    inputs[i].value = letter || "";
                });
            }

            // 🚫 Active word → CLEAR IT COMPLETELY
            else if (wIndex === currentWordIndex) {
                inputs.forEach(input => input.value = "");
            }
        });

        // 🔥 RE-APPLY LOCKED LETTERS (from hints)
        Object.keys(lockedLetters).forEach(key => {
            const [wIndex, lIndex] = key.split("-").map(Number);

            const inputs = getInputs(wIndex);
            if (!inputs) return;

            const input = inputs[lIndex];

            input.classList.add("locked-letter");
            input.disabled = false; // still editable row, just locked letter
        });

        // 🔥 ENSURE FIRST HINT LETTER IS CORRECT
        if (hintLevel >= 1 && currentWordIndex < puzzle.chain.length) {
            const inputs = getInputs(currentWordIndex);
            const letter = puzzle.hints[currentWordIndex][0].toUpperCase();

            inputs[0].value = letter;
            inputs[0].classList.add("locked-letter");

            lockedLetters[`${currentWordIndex}-0`] = true;
        }

        // restore completed/active states
        const rows = document.querySelectorAll("#chain .word-row");

        rows.forEach((row, i) => {
            row.classList.remove("active");

            if (i < currentWordIndex) {
                row.classList.add("completed");
                getInputs(i).forEach(input => input.disabled = true);
            }
        });

        if (currentWordIndex < rows.length) {
            rows[currentWordIndex].classList.add("active");
        }

        document.getElementById("score-value").textContent = `${totalScore} PTS`;

        const hintBtn = document.getElementById("hint-btn");
        const hintBox = document.getElementById("hint-display");

        // reset UI first
        hintBtn.textContent = "1ST HINT";
        clearHintBox();

        // restore based on hintLevel
        if (hintLevel === 1) {
            hintBtn.textContent = "2ND HINT";
        }
        else if (hintLevel === 2) {
            hintBtn.textContent = "REVEAL";

            const clue = puzzle.hints[currentWordIndex][1];

            hintBox.innerHTML = `
                <div class="hint-body">${clue}</div>
            `;

            // ⛔ DON'T show immediately
            hintBox.classList.remove("show");

            // ✅ wait until UI fades in, then show
            const totalDelay = 1000 + (puzzle.chain.length * 120) + 200;

            setTimeout(() => {
                hintBox.classList.add("show");
            }, totalDelay + 200); // slight buffer after UI
        }

        // 🎯 FIX CURRENT LETTER POSITION + FOCUS
        if (currentWordIndex < puzzle.chain.length) {
            const inputs = getInputs(currentWordIndex);

            // skip locked letters
            while (
                currentLetterIndex < inputs.length &&
                lockedLetters[`${currentWordIndex}-${currentLetterIndex}`]
            ) {
                currentLetterIndex++;
            }

            // clamp safety
            if (currentLetterIndex >= inputs.length) {
                currentLetterIndex = inputs.length - 1;
            }

            // focus correct box
            inputs[currentLetterIndex].focus();
        }

        // 🏁 GAME COMPLETE STATE
        if (currentWordIndex >= puzzle.chain.length) {
            const hintBtn = document.getElementById("hint-btn");

            hintBtn.textContent = "RESULTS";
            hintBtn.onclick = showEndPopup;

            // optional: auto-show results on reload
            // showEndPopup();
        }

        return true;
    }


    function copyResults() {
        const date = getTodayDate();
        const emoji = getMedalEmoji(totalScore);

        const text = `PHRASE CHAIN\n${date}\n${totalScore} PTS${emoji}`;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy);
        } else {
            fallbackCopy();
        }

        function fallbackCopy() {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            showCopied();
        }

        function showCopied() {
            const btn = document.querySelector("#popup-content button");
            const original = btn.textContent;

            btn.textContent = "COPIED";

            setTimeout(() => {
                btn.textContent = original;
            }, 1000);
        }
    }

</script>

<div id="end-popup" class="hidden">
  <div id="popup-content">

    <div id="popup-close" onclick="closePopup()">✕</div>

    <div id="popup-logo">
        <img src="/static/PhraseChainIcon.svg">
        </div>

    <div id="popup-emoji"></div>

    <div id="popup-score"></div>
    <div id="popup-date"></div>

    <button onclick="copyResults()">COPY</button>

  </div>
</div>

<div id="tutorial-popup" class="popup hidden">
    <div id="tutorial-content">

        <div id="tutorial-close" onclick="closeTutorial()">✕</div>

        <img src="static/tutorial.png" id="tutorial-image">

    </div>
</div>

</body>
