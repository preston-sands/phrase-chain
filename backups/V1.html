<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        /* PAGE SETUP */
        :root {
            --letter-color: #222222;
            }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #FFF8F6;
            overflow-x: hidden;
            }

        /* LOGO */
        #logo-container {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 75px;
            }

        #logo {
            width: 420px;
            height: auto;
            }


        /* PHRASE CHAIN */
        .word-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 8px;
            }

        input {
            width: 42px;
            height: 42px;
            font-size: 22px;
            text-align: center;
            text-transform: uppercase;
            border: 3px solid #a3a3a3;
            border-radius: 8px;
            font-weight: bold;

            background-color: #FFF8F6;

            caret-color: transparent;

            color: var(--letter-color);
            }

        input:focus {
            outline: none;
            }


        /* ACTIVE WORD (current row) */
        .active input {
            background-color: #FFF8F6;
            border-color: #6a80f7;
            box-shadow: 0 0 8px #6a80f7;
            }

        .completed input {
            background-color: #FFF8F6;
            }


        /* WRONG WORD FEEDBACK */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
            }

        .shake-input {
            animation: shake 0.25s;
            }

        .flash {
            background-color: #ffbaca !important;
            border-color: #ff5b81 !important;
            box-shadow: 0 0 8px #ff5b81 !important;
            }


        /* CORRECT WORD FEEDBACK */
        @keyframes correctShake {
            0%   { transform: scale(1.05); background-color: #c8d1ff;}
            25%  { transform: scale(1.1); background-color: #c8d1ff;}
            50%  { transform: scale(1.15); background-color: #c8d1ff;}
            75%  { transform: scale(1.05); background-color: #c8d1ff;}
            100% { transform: translateY(0); background-color: #FFF8F6; }
            }

        .correct-anim input {
            animation: correctShake 0.25s ease;
            }


        /* HINT BOX */
        #hint-display {
            position: fixed;
            bottom: 335px;
            left: 50%;
            transform: translateX(-50%);

            width: 455px;

            padding: 12px 20px;

            border-radius: 100px;
            border: 3px solid #F2B146;

            background-color: #FFF8F6;

            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;

            opacity: 0;
            transition: opacity 0.5s ease;

            text-align: center;
            }

        .hint-title {
            font-size: 22px;
            font-weight: bold;
            color: #F2B146;
            margin-bottom: 4px;
            }

        .hint-body {
            font-size: 16px;
            font-weight: bold;
            color: #222222;
            word-wrap: break-word;
            }

        #hint-display.show {
            opacity: 1;
            }

        .no-transition {
            transition: none !important;
            }


        /* EXIT/SCORE/HINT BAR */
        #bottom-bar {
            position: fixed;
            bottom: 260px; /* 👈 key change */

            left: 50%;
            transform: translateX(-50%);

            display: flex;
            align-items: center;
            gap: 10px;

            z-index: 1000;
            }
            
        button {
            height: 56px;
            width: 160px;
            line-height: 1;

            border-radius: 100px;
            border: 3px solid #a3a3a3;
            background-color: #FFF8F6;

            font-size: 22px;
            font-weight: bold;

            cursor: pointer;
            text-transform: uppercase;

            transition: all 0.15s ease;
            }

        button:hover {
            transform: translateY(-2px);
            border: 3px solid #F2B146;
            box-shadow: 0 0 8px #F2B146;
            transform: scale(1.05);
            }   

            /* click */
            button:active {
            transform: scale(0.95);
            }
            
        /* SCORE BOX */
        #score-box {
            height: 50px;
            width: 160px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 100px;
            border: 3px solid #a3a3a3;
            text-transform: uppercase;

            background-color: #FFF8F6;

            position: relative;

            font-weight: bold;
            font-size: 22px;
            }

        #score-popup {
            position: absolute;
            left: 50%;
            top: -40px; /* start just above box */
            transform: translateX(-50%);
            font-size: 30px;
            font-weight: bold;
            color: #6a80f7;

            opacity: 0;
            pointer-events: none;
            }   

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(-50%, 0px);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -25px);
            }
            }       

        .score-animate {
            animation: floatUp 2s ease;
            }

        @keyframes scoreFlash {
            0% {
                border: 3px solid #6a80f7;
                box-shadow: 0 0 8px #6a80f7;
            }
            100% {
                border: 3px solid #a3a3a3;
                box-shadow: 0 0 0px transparent;
            }   
            }

        .score-flash {
            animation: scoreFlash 2s ease;
        }

        .score-animate {
            animation: floatUp 2s ease;
        }

    

    
    




        

    /* START WORD INITIAL STATE */
        #start-row {
        transform: scale(0.8);
        opacity: 0;
        }

        /* BOUNCE IN */
        @keyframes startPop {
            0% {
                transform: scale(0.75);
                opacity: 0;
            }
            60% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1; /* ✅ THIS FIXES IT */
            }
        }

        .start-pop {
        animation: startPop 1s ease forwards;
        }

    /* CHAIN INITIAL STATE */
       #chain .word-row {
        opacity: 0;
        transform: translateY(-10px);
        }


    /* FADE IN ANIMATION */
    @keyframes fadeDown {
    to {
        opacity: 1;
        transform: translateY(0);
    }
    }

    .word-row.show {
        animation: fadeDown 0.4s ease forwards;
        }

    #keyboard {
        position: fixed;
        bottom: 0; /* anchor to bottom */

        left: 50%;
        transform: translateX(-50%);

        display: flex;
        flex-direction: column;
        gap: 6px;

        padding: 10px 0 10px 0;
        margin-bottom: 80px;

        background: #FFF8F6; /* prevents overlap bleed */
        z-index: 999; /* below bottom bar */
        }

    .kb-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    }

    #keyboard button {
    width: 48px;
    height: 48px;

    border-radius: 8px;
    border: 3px solid #a3a3a3;
    background: #FFF8F6;

    font-weight: bold;
    font-size: 16px;

    cursor: pointer;
    }

    #keyboard button:hover {
        border: 3px solid #a3a3a3;       /* reset border */
        box-shadow: none;             /* remove glow */
        }

    #keyboard button.wide {
    width: 60px;
    }

    #keyboard button:active {
        transform: scale(0.9);
        }


    /* INITIAL STATE */
        #ui-container {
            position: fixed;
            bottom: 0;            /* anchor to bottom */
            left: 0;
            width: 100%;          /* 🔥 THIS is the big missing piece */
            
            opacity: 0;
            pointer-events: none;
        }

    /* ANIMATION */
    @keyframes uiFadeBounce {
    0% {
        opacity: 0;
        transform: translateY(0) scale(1);
    }
    50% {
        opacity: 1;
        transform: translateY(0) scale(1.05);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
    }

    /* ACTIVE STATE */
    #ui-container.show {
    animation: uiFadeBounce 0.5s ease forwards;
    pointer-events: auto;
    }

        /* OVERLAY */
    #end-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.4);

    display: flex;
    align-items: center;
    justify-content: center;

    z-index: 2000;
    }

    /* HIDDEN STATE */
    .hidden {
    display: none !important;
    }

    /* POPUP BOX */
    #popup-content {
    background: #FFF8F6;
    padding: 30px 40px;
    border-radius: 20px;
    border: 8px solid #ccc;

    text-align: center;

    position: relative;
    width: 320px;
    }

    /* CLOSE BUTTON */
    #popup-close {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 22px;
    cursor: pointer;
    }

    #popup-logo img {
        width: 200px;
        margin-bottom: 10px;
        }

    #popup-date {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
    }

    /* EMOJI */
    #popup-emoji {
    font-size: 60px;
    margin-bottom: 10px;
    }

    /* SCORE */
    #popup-score {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 5px;
    }

    </style>
</head>

<body>
  <!-- LOGO -->
  <div id="logo-container">
    <img src="/static/PhraseChainIcon.svg" id="logo">
  </div>

  <!-- START WORD -->
  <div id="start-row" class="word-row"></div>
  <div id="chain"></div>

    <div id="hint-display"></div>
    <div id="ui-container">

        <div id="bottom-bar">
            <button id="exit-btn" onclick="exitGame()">Exit</button>

            <div id="score-box">
                <div id="score-value">SCORE: 0</div>
                <div id="score-popup"></div>
            </div>

            <button id="hint-btn" onclick="useHint()">1st Hint</button>
        </div>

        <div id="keyboard">
        <div class="kb-row">
            <button data-key="Q">Q</button>
            <button data-key="W">W</button>
            <button data-key="E">E</button>
            <button data-key="R">R</button>
            <button data-key="T">T</button>
            <button data-key="Y">Y</button>
            <button data-key="U">U</button>
            <button data-key="I">I</button>
            <button data-key="O">O</button>
            <button data-key="P">P</button>
        </div>

        <div class="kb-row">
            <button data-key="A">A</button>
            <button data-key="S">S</button>
            <button data-key="D">D</button>
            <button data-key="F">F</button>
            <button data-key="G">G</button>
            <button data-key="H">H</button>
            <button data-key="J">J</button>
            <button data-key="K">K</button>
            <button data-key="L">L</button>
        </div>

        <div class="kb-row">
            <button data-key="Z">Z</button>
            <button data-key="X">X</button>
            <button data-key="C">C</button>
            <button data-key="V">V</button>
            <button data-key="B">B</button>
            <button data-key="N">N</button>
            <button data-key="M">M</button>
            <button class="wide" data-key="Backspace">⌫</button>
        </div>
        </div>
    </div>

<script>
    let puzzle;
    let currentWordIndex = 0;
    let hintLevel = 0;
    let lockedLetters = {}; // track locked letters from hints
    let currentLetterIndex = 0;
    let totalScore = 0;
    let wordScores = []; // track each word's score

    async function loadPuzzle() {
    const res = await fetch("/api/puzzle");
    puzzle = await res.json();

    renderStartWord();
    renderChain();

    // trigger bounce AFTER render
    setTimeout(() => {
    document.getElementById("start-row").classList.add("start-pop");
    }, 50);

    // ✅ focus first box automatically
    const firstInputs = getInputs(0);
    firstInputs[0].disabled = false;
    firstInputs[0].focus();
    }

    function renderStartWord() {
    const container = document.getElementById("start-row");
    container.innerHTML = "";

    container.classList.add("completed"); // ✅ ADD THIS

    puzzle.start.split("").forEach(char => {
        if (char === " ") {
        const spacer = document.createElement("div");
        spacer.style.width = "20px"; // half-width gap
        container.appendChild(spacer);
        return;
        }

        const box = document.createElement("input");
        box.value = char.toUpperCase();
        box.disabled = true;

        container.appendChild(box);
    });
    }

    function updateScoreDisplay(pointsGained) {
        const scoreValue = document.getElementById("score-value");
        const popup = document.getElementById("score-popup");
        const scoreBox = document.getElementById("score-box");

        // update total
        scoreValue.textContent = `SCORE: ${totalScore}`;

        // ✨ trigger border glow
        scoreBox.classList.remove("score-flash");
        void scoreBox.offsetWidth; // restart animation
        scoreBox.classList.add("score-flash");

        // ✨ show +points
        popup.textContent = `+${pointsGained}`;
        popup.classList.remove("score-animate");
        void popup.offsetWidth;
        popup.classList.add("score-animate");
        }

    function renderChain() {
    const container = document.getElementById("chain");
    container.innerHTML = "";

    function exitGame() {
        if (confirm("Exit today's puzzle?")) {
            window.location.reload(); // simple reset
        }
        }

    puzzle.chain.forEach((word, wIndex) => {
        const row = document.createElement("div");
        row.classList.add("word-row");

        if (wIndex === 0) row.classList.add("active");

        for (let i = 0; i < word.length; i++) {
        const input = document.createElement("input");

        input.maxLength = 1;
        input.dataset.word = wIndex;
        input.dataset.letter = i;

        input.disabled = !(wIndex === 0 && i === 0);

        row.appendChild(input);
        }

        container.appendChild(row);

        const baseDelay = 800; // wait for start word bounce

        setTimeout(() => {
            row.classList.add("show");
            }, baseDelay + (wIndex * 120));
    });

    const totalDelay = 1000 + (puzzle.chain.length * 120) + 200;

    setTimeout(() => {
    document.getElementById("ui-container").classList.add("show");
    }, totalDelay);
    
    }

    function getRow(wordIndex) {
    return document.querySelectorAll("#chain .word-row")[wordIndex];
    }

    function getInputs(wordIndex) {
    return document.querySelectorAll(`input[data-word='${wordIndex}']`);
    }

    function handleKeyPress(e) {
    const inputs = getInputs(currentWordIndex);
    const key = e.key;

    if (key === "Backspace" || /^[a-zA-Z]$/.test(key)) {
        e.preventDefault();
    }

    // ignore if finished
    if (currentWordIndex >= puzzle.chain.length) return;

    // LETTER INPUT
    if (/^[a-zA-Z]$/.test(key)) {
    const inputs = getInputs(currentWordIndex);

    // find next available slot
    while (
        currentLetterIndex < inputs.length &&
        lockedLetters[`${currentWordIndex}-${currentLetterIndex}`]
    ) {
        currentLetterIndex++;
    }

    if (currentLetterIndex >= inputs.length) return;

    inputs[currentLetterIndex].value = key.toUpperCase();

    currentLetterIndex++;

    checkWord();
        }

    // BACKSPACE
        else if (key === "Backspace") {
        const inputs = getInputs(currentWordIndex);

        // find the last filled index BEFORE current position
        let i = currentLetterIndex - 1;

        // move left until we find something editable
        while (i >= 0) {
            // skip locked letters
            if (lockedLetters[`${currentWordIndex}-${i}`]) {
            i--;
            continue;
            }

            // clear this box
            if (inputs[i].value !== "") {
            inputs[i].value = "";
            currentLetterIndex = i;
            return;
            }

            i--;
        }

        // if we reach here, do nothing (protects first letter)
        }
    }

    function checkWord() {
    const inputs = getInputs(currentWordIndex);
    const values = Array.from(inputs).map(i => i.value);

    // ⛔ Don't check until ALL letters filled
    if (values.some(v => v === "")) return;

    const guess = values.join("");
    const answer = puzzle.chain[currentWordIndex].toUpperCase();

    if (guess === answer) {
        lockWord(inputs);
    } else {
        showWrongFeedback(inputs);
    }
    }

    function clearHintBox() {
        const hintBox = document.getElementById("hint-display");

        // 🚫 disable animation temporarily
        hintBox.classList.add("no-transition");

        // instantly hide
        hintBox.classList.remove("show");
        hintBox.innerHTML = "";

        // force reflow (locks it in)
        void hintBox.offsetHeight;

        // ✅ re-enable animation for next time
        hintBox.classList.remove("no-transition");
        }

    function lockWord(inputs) {
    const row = getRow(currentWordIndex);

    // apply green shake to whole row
    row.classList.add("correct-anim");

    setTimeout(() => {
        row.classList.remove("correct-anim");

        inputs.forEach(i => {
        i.disabled = true;
        });

        row.classList.remove("active");
        row.classList.add("completed");

        // 🎯 SCORE CALCULATION
    let score = 0;

    if (hintLevel === 0) score = 300;
    else if (hintLevel === 1) score = 200;
    else if (hintLevel === 2) score = 100;
    else score = 0;

    totalScore += score;
    wordScores.push(score);
    updateScoreDisplay(score);

    // reset for next word
    currentWordIndex++;
    hintLevel = 0;

    const hintBox = document.getElementById("hint-display");
    const hintBtn = document.getElementById("hint-btn");

    // clear hint UI
    clearHintBox();

    // reset button text
    hintBtn.textContent = "1ST HINT";

        unlockNextWord();
    }, 350);
    }

    function getMedal(score) {
    if (score === 2100) return "Perfect 🎖️";
    if (score >= 1900) return "Gold 🥇";
    if (score >= 1500) return "Silver 🥈";
    if (score >= 700) return "Bronze 🥉";
    return "☠️";
    }

    function unlockNextWord() {
    const rows = document.querySelectorAll("#chain .word-row");

    if (currentWordIndex >= puzzle.chain.length) {
        const hintBtn = document.getElementById("hint-btn");

        // change button to RESULTS
        hintBtn.textContent = "RESULTS";
        hintBtn.onclick = showEndPopup;

        showEndPopup();
        return;
    }

    const nextRow = rows[currentWordIndex];
    nextRow.classList.add("active");

    const inputs = getInputs(currentWordIndex);

    inputs.forEach(i => i.disabled = false);

    currentLetterIndex = 0; // ✅ critical

    inputs[0].focus();
    }

    function showWrongFeedback(inputs) {
        inputs.forEach(input => {
            input.classList.add("flash");
            input.classList.add("shake-input");
        });

        setTimeout(() => {
            inputs.forEach(input => {
                input.classList.remove("flash");
                input.classList.remove("shake-input");
            });
        }, 300);
    }

    function useHint() {
        const inputs = getInputs(currentWordIndex);
        const hintBtn = document.getElementById("hint-btn");
        const hintBox = document.getElementById("hint-display");

        // 🥇 FIRST HINT
        if (hintLevel === 0) {

            // reset word
            inputs.forEach((input, i) => {
            input.value = "";
            input.classList.remove("locked-letter");
            input.disabled = false;
            delete lockedLetters[`${currentWordIndex}-${i}`];
            });

            currentLetterIndex = 0;

            const letter = puzzle.hints[currentWordIndex][0].toUpperCase();

            inputs[0].value = letter;
            inputs[0].classList.add("locked-letter");

            lockedLetters[`${currentWordIndex}-0`] = true;

            currentLetterIndex = 1;

            hintBtn.textContent = "2ND HINT";
        }

        // 🥈 SECOND HINT
        else if (hintLevel === 1) {

            const clue = puzzle.hints[currentWordIndex][1];

            hintBox.innerHTML = `
                <div class="hint-title">HINT:</div>
                <div class="hint-body">${clue}</div>
                `;
            hintBox.classList.add("show");

            hintBtn.textContent = "REVEAL";
        }

        // 🟥 REVEAL
        else if (hintLevel === 2) {

            const answer = puzzle.chain[currentWordIndex].toUpperCase();

            inputs.forEach((input, i) => {
            input.value = answer[i];
            input.disabled = true;
            });

            clearHintBox();

            lockWord(inputs);
        }

        hintLevel++;
        }

    loadPuzzle();
    document.addEventListener("keydown", handleKeyPress);

    function getTodayDate() {
    const d = new Date();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const yyyy = d.getFullYear();
    return `${mm}-${dd}-${yyyy}`;
    }

    function getMedalEmoji(score) {
    if (score === 700) return "🎖️";
    if (score >= 650) return "🥇";
    if (score >= 550) return "🥈";
    if (score >= 300) return "🥉";
    return "☠️";
    }

    function showEndPopup() {
    const popup = document.getElementById("end-popup");

    const date = getTodayDate();
    const emoji = getMedalEmoji(totalScore);

    document.getElementById("popup-date").textContent = date;

    document.getElementById("popup-emoji").textContent = emoji;

    document.getElementById("popup-score").textContent =
        `SCORE: ${totalScore}`;

    popup.classList.remove("hidden");
    }

    function closePopup() {
    document.getElementById("end-popup").classList.add("hidden");
    }

    function copyResults() {
        const date = getTodayDate();
        const emoji = getMedalEmoji(totalScore);

        const text = `PHRASE CHAIN\n${date}\n${emoji}${totalScore}`;

        navigator.clipboard.writeText(text);

        const btn = document.querySelector("#popup-content button");
        const original = btn.textContent;

        btn.textContent = "COPIED!";
        
        setTimeout(() => {
            btn.textContent = original;
        }, 1000);
        }

    document.addEventListener("click", (e) => {
        if (e.target.matches("#keyboard button")) {
            const key = e.target.dataset.key;

            handleKeyPress({
            key: key,
            preventDefault: () => {}
            });
        }
        });

</script>

<div id="end-popup" class="hidden">
  <div id="popup-content">

    <div id="popup-close" onclick="closePopup()">✕</div>

    <div id="popup-logo">
        <img src="/static/PhraseChainIcon.svg">
        </div>

    <div id="popup-emoji"></div>

    <div id="popup-score"></div>
    <div id="popup-date"></div>

    <button onclick="copyResults()">COPY</button>

  </div>
</div>

</body>
</html>
